services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glamour
      POSTGRES_USER: glamour
      POSTGRES_PASSWORD: glamour
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glamour -d glamour"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg://glamour:glamour@postgres:5432/glamour
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: glamour-admin
      AUTH_SECRET: glamour-auth-secret
      ALLOW_CORS_ORIGINS: http://127.0.0.1:8000,http://localhost:8000,http://127.0.0.1:5173,http://localhost:5173
      VK_CALLBACK_SECRET: glamour-secret
      VK_CONFIRMATION_TOKEN: glamour-confirm
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
